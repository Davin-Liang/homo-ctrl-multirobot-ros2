controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omnidirectional_controller:
      type: omnidirectional_controllers/OmnidirectionalController

omnidirectional_controller:
  ros__parameters:
    # 关节名必须与 URDF/Xacro 的 prefix 一致
    wheel_names:
      - robot1_front_wheel_joint
      - robot1_left_wheel_joint
      - robot1_right_wheel_joint

    # 几何参数（与计划一致）：L=robot_radius, r=wheel_radius
    robot_radius: 0.24
    wheel_radius: 0.03

    # 三轮对称布置时常用 gamma=60deg（控制器内部会 DEG2RAD）
    gamma: 60.0

    # 里程计/TF
    odom_frame_id: robot1_odom
    base_frame_id: robot1_base_footprint
    open_loop: false
    enable_odom_tf: false
    odom_numeric_integration_method: euler_forward
    publish_rate: 50.0

    # cmd_vel 输入：默认订阅 ~/cmd_vel_unstamped 或 ~/cmd_vel
    use_stamped_vel: false
    cmd_vel_timeout: 0.5

    # 需要显式提供 6 维对角协方差（代码会逐项读取）
    pose_covariance_diagonal: [0.001, 0.001, 99999.0, 99999.0, 99999.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 99999.0, 99999.0, 99999.0, 0.01]

