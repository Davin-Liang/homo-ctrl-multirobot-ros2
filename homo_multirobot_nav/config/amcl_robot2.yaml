amcl:
  ros__parameters:
    # General
    use_sim_time: true

    # AMCL general
    odom_frame_id: robot2_odom
    base_frame_id: robot2_base_footprint
    global_frame_id: map
    scan_topic: scan
    tf_broadcast: true
    transform_tolerance: 10.0

    # Particle filter
    min_particles: 500
    max_particles: 2000
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    update_min_d: 0.2
    update_min_a: 0.2
    resample_interval: 1

    # Laser model (likelihood_field)
    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    laser_max_beams: 60
    laser_z_hit: 0.5
    laser_z_rand: 0.5
    laser_z_max: 0.05
    laser_z_short: 0.05
    sigma_hit: 0.2

    # Initial pose
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # Map
    always_reset_initial_pose: false
    first_map_only: false
