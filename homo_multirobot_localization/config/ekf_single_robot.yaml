/**:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true

    # Let EKF be the single TF source by default.
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true

    # Inputs (topics are relative to `namespace` in launch by default)
    odom0: rf2o/odom
    imu0: imu

    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  true,  false]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

